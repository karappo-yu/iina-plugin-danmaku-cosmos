<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="index.css" />
  <title>Danmaku Control</title>
</head>

<body>
  <div id="root">
    <div class="section">
      <div class="toggle-row">
        <span class="toggle-label" data-i18n="danmaku_visible">Danmaku On</span>
        <label class="switch" data-clickable>
          <input type="checkbox" id="toggle-danmaku" checked />
          <span class="switch-slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="toggle-row">
        <span class="toggle-label" data-i18n="render_canvas">Canvas Render</span>
        <label class="switch" data-clickable>
          <input type="checkbox" id="render-mode-canvas" />
          <span class="switch-slider"></span>
        </label>
      </div>
      <div class="hint-text" data-i18n="render_canvas_hint">Use niconicomments canvas engine</div>
      <div class="hint-text canvas-hint" data-i18n="render_canvas_note" style="display:none;">Opacity, Font Scale, Block Scroll/Top/Bottom are available</div>
    </div>

    <div class="section">
      <h3 class="section-title" data-i18n="lane_limit">Lane Limit</h3>
      <div class="control-row">
        <input type="range" id="max-lane-slider" data-clickable min="10" max="100" step="5" value="100" class="slider" />
        <span id="max-lane-value" class="value-text">100%</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title" data-i18n="opacity">Opacity</h3>
      <div class="control-row">
        <input type="range" id="opacity-slider" data-clickable min="0.1" max="1" step="0.05" value="0.7" class="slider" />
        <span id="opacity-value" class="value-text">70%</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title" data-i18n="font_scale">Font Scale</h3>
      <div class="control-row">
        <input type="range" id="fontsize-slider" data-clickable min="25" max="150" step="5" value="100" class="slider" />
        <span id="fontsize-value" class="value-text">100%</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title" data-i18n="scroll_duration">Scroll Duration</h3>
      <div class="control-row">
        <input type="range" id="duration-slider" data-clickable min="3000" max="15000" step="500" value="8000" class="slider" />
        <span id="duration-value" class="value-text">8.0s</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title" data-i18n="danmaku_block">Block</h3>
      <div class="checkbox-group">
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-force-lane" /> <span data-i18n="block_force_lane">Block Overflow</span>
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-scroll" /> <span data-i18n="block_scroll">Block Scroll</span>
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-top" /> <span data-i18n="block_top">Block Top</span>
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-bottom" /> <span data-i18n="block_bottom">Block Bottom</span>
        </label>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
