<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="index.css" />
  <title>弹幕控制</title>
</head>

<body>
  <div id="root">
    <div class="section">
      <div class="toggle-row">
        <span class="toggle-label">弹幕显示</span>
        <label class="switch" data-clickable>
          <input type="checkbox" id="toggle-danmaku" checked />
          <span class="switch-slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">透明度</h3>
      <div class="control-row">
        <input type="range" id="opacity-slider" data-clickable min="0.1" max="1" step="0.05" value="0.7" class="slider" />
        <span id="opacity-value" class="value-text">70%</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">缩放倍率</h3>
      <div class="control-row">
        <input type="range" id="fontsize-slider" data-clickable min="50" max="200" step="5" value="100" class="slider" />
        <span id="fontsize-value" class="value-text">100%</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">滚动时长</h3>
      <div class="control-row">
        <input type="range" id="duration-slider" data-clickable min="3000" max="15000" step="500" value="8000" class="slider" />
        <span id="duration-value" class="value-text">8.0s</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">弹幕屏蔽</h3>
      <div class="checkbox-group">
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-scroll" /> 屏蔽滚动弹幕
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-top" /> 屏蔽顶部弹幕
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-bottom" /> 屏蔽底部弹幕
        </label>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">弹幕限流</h3>
      <div class="control-row">
        <input type="range" id="max-per-sec-slider" data-clickable min="0" max="60" step="1" value="20" class="slider" />
        <span id="max-per-sec-value" class="value-text">20/s</span>
      </div>
      <div class="hint-text">每秒最大弹幕数，0 = 不限流</div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
