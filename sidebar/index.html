<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="index.css" />
  <title>弹幕控制</title>
</head>

<body>
  <div id="root">
    <div class="section">
      <div class="section-header">
        <h3 class="section-title">弹幕开关</h3>
        <button id="btn-toggle" data-clickable class="btn btn-on">开启</button>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">透明度</h3>
      <div class="control-row">
        <input type="range" id="opacity-slider" data-clickable min="0.1" max="1" step="0.05" value="0.7" class="slider" />
        <span id="opacity-value" class="value-text">70%</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">字体大小</h3>
      <div class="control-row">
        <input type="range" id="fontsize-slider" data-clickable min="14" max="40" step="1" value="25" class="slider" />
        <span id="fontsize-value" class="value-text">25px</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">滚动速度</h3>
      <div class="control-row">
        <input type="range" id="speed-slider" data-clickable min="200" max="1200" step="20" value="680" class="slider" />
        <span id="speed-value" class="value-text">680</span>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">弹幕屏蔽</h3>
      <div class="checkbox-group">
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-scroll" /> 屏蔽滚动弹幕
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-top" /> 屏蔽顶部弹幕
        </label>
        <label class="checkbox-label" data-clickable>
          <input type="checkbox" id="block-bottom" /> 屏蔽底部弹幕
        </label>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">弹幕统计</h3>
      <div id="danmaku-info" class="info-text">未加载弹幕</div>
    </div>

    <div class="section">
      <h3 class="section-title">快捷键</h3>
      <div class="help-text">
        <p><kbd>D</kbd> 切换弹幕显示</p>
      </div>
    </div>

    <div class="section">
      <h3 class="section-title">使用说明</h3>
      <div class="help-text">
        <p>将弹幕XML文件放在视频同目录下，文件名与视频相同（扩展名为.xml）。</p>
        <p>支持Bilibili格式的弹幕XML文件。</p>
        <p>示例：<code>video.mp4</code> → <code>video.xml</code></p>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
