name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Plugin
        run: |
          mkdir -p dist
          zip -r dist/danmaku-cosmos.iinaplgz \
            Info.json \
            main.js \
            global.js \
            preferences.html \
            overlay \
            sidebar \
            -x "*.DS_Store" \
            -x "*__MACOSX*" \
            -x "*.git*" \
            -x ".github/*" \
            -x ".workbuddy/*" \
            -x ".trae/*" \
            -x "index.d.ts" \
            -x "IINA插件开发指南.md" \
            -x "弹幕解析渲染对比报告.md" \
            -x "README.md" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "sh/*"
          echo "Package created:"
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/danmaku-cosmos.iinaplgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}